<div class="flex gap-2">
  @for (option of colorOptions; track option) {
    <button
      type="button"
      class="relative flex size-14 items-center justify-center rounded-xl border-2 bg-white transition hover:-translate-y-0.5 hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pink-500 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-35 disabled:hover:translate-y-0 disabled:hover:shadow-none"
      [class.border-pink-600]="colorOption() === option"
      [class.border-gray-200]="colorOption() !== option"
      [disabled]="disabled()"
      (click)="select(option)"
    >
      @if (shape() === 'heart') {
        <svg class="size-8" viewBox="0 0 24 24" [style.color]="option">
          <path
            fill="currentColor"
            stroke="rgba(0, 0, 0, 0.18)"
            stroke-width="0.75"
            d="M12 21.35 10.55 20.03C5.4 15.36 2 12.27 2 8.5
         2 5.41 4.42 3 7.5 3
         9.24 3 10.91 3.81 12 5.09
         13.09 3.81 14.76 3 16.5 3
         19.58 3 22 5.41 22 8.5
         22 12.27 18.6 15.36 13.45 20.04Z"
          />
        </svg>
      } @else if (shape() === 'square') {
        <svg class="size-8" viewBox="0 0 24 24" [style.color]="option">
          <rect
            x="3"
            y="3"
            width="18"
            height="18"
            rx="2.5"
            fill="currentColor"
            stroke="rgba(0, 0, 0, 0.18)"
            stroke-width="0.75"
          />
        </svg>
      }
    </button>
  }
</div>
