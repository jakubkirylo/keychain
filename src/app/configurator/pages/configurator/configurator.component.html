<div class="min-h-screen p-4 grid grid-rows-[auto_1fr_auto] gap-6">
  <div class="flex flex-col items-center gap-3">
    <div class="flex items-center gap-3">
      <mat-icon class="size-8 text-[32px] leading-8"> favorite </mat-icon>
      <h1 class="font-semibold text-2xl">Breloki personalizowane</h1>
    </div>
    <span>Stwórz swój własny brelok z grawerem i wybierz spośród wielu dostępnych opcji.</span>
  </div>
  <main class="grid grid-cols-[1fr_2fr] items-center justify-center gap-4">
    <div class="h-full grid grid-rows-[1fr_1fr] gap-4">
      <!-- Preview section -->
      <mat-card class="h-full" appearance="outlined"> </mat-card>
      <app-summary class="h-full" [model]="configuratorModel()"></app-summary>
    </div>
    <form (submit)="onSubmit($event)" class="h-full flex flex-col gap-4">
      <!-- Snap hook section -->
      <mat-card appearance="outlined">
        <mat-card-header>
          <span class="font-semibold text-sm">1. Karabińczyk - kolor</span>
        </mat-card-header>

        <mat-card-content class="pt-4"
          ><app-snap-hook [formField]="configuratorForm.snapHook"></app-snap-hook>
        </mat-card-content>
      </mat-card>
      <!-- Heart section -->
      <mat-card appearance="outlined">
        <mat-card-header>
          <span class="font-semibold text-sm">2. Zawieszka serce</span>
        </mat-card-header>
        <mat-card-content>
          <div class="flex flex-col gap-2">
            <app-yes-no-toggle [formField]="configuratorForm.heart.enabled" />
            <app-colors [formField]="configuratorForm.heart.color" [shape]="'heart'" />
          </div>
        </mat-card-content>
      </mat-card>
      <!-- Name section -->
      <mat-card appearance="outlined">
        <mat-card-header>
          <span class="font-semibold text-sm">3. Zawieszka z imieniem</span>
        </mat-card-header>
        <mat-card-content>
          <div class="flex flex-col gap-2">
            <app-yes-no-toggle [formField]="configuratorForm.name.enabled" />
            <div class="flex flex-col gap-2">
              <div
                class="ml-2 text-sm font-semibold transition-opacity"
                [class.cursor-not-allowed]="!configuratorModel().name.enabled"
                [class.opacity-35]="!configuratorModel().name.enabled"
              >
                Kolor tła
              </div>
              <app-colors [formField]="configuratorForm.name.backgroundColor" [shape]="'square'" />
            </div>
            <div class="flex flex-col gap-2">
              <div
                class="ml-2 text-sm font-semibold transition-opacity"
                [class.cursor-not-allowed]="!configuratorModel().name.enabled"
                [class.opacity-35]="!configuratorModel().name.enabled"
              >
                Kolor liter
              </div>
              <app-colors [formField]="configuratorForm.name.fontColor" [shape]="'square'" />
            </div>
          </div>
        </mat-card-content>
      </mat-card>
      <!-- Custom text section -->
      <mat-card appearance="outlined">
        <mat-card-header>
          <span class="font-semibold text-sm">4. Zawieszka z dodatkowym tekstem</span>
        </mat-card-header>
        <mat-card-content>
          <div class="flex flex-col gap-2">
            <app-yes-no-toggle [formField]="configuratorForm.custom.enabled" />
            <div class="flex flex-col gap-2">
              <div
                class="ml-2 text-sm font-semibold transition-opacity"
                [class.cursor-not-allowed]="!configuratorModel().custom.enabled"
                [class.opacity-35]="!configuratorModel().custom.enabled"
              >
                Kolor zawieszki
              </div>
              <app-colors [formField]="configuratorForm.custom.color" [shape]="'square'" />
              <app-custom-text [formField]="configuratorForm.custom"></app-custom-text>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </form>
  </main>
  <footer>
    <div class="grid gap-3 md:grid-cols-[minmax(220px,0.65fr)_minmax(320px,1.35fr)]">
      <button
        (click)="resetForm()"
        type="button"
        class="flex min-h-12 items-center justify-center gap-2 rounded-xl border border-gray-300 bg-white px-6 py-3 font-medium text-gray-700 transition hover:bg-gray-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pink-500 focus-visible:ring-offset-2"
      >
        <mat-icon class="size-8 text-[32px] leading-8"> delete </mat-icon>
        Wyczyść wszystko
      </button>

      <button
        type="button"
        class="flex min-h-12 items-center justify-center gap-2 rounded-xl bg-pink-600 px-6 py-3 font-semibold text-white shadow-sm transition hover:bg-pink-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pink-500 focus-visible:ring-offset-2"
      >
        <mat-icon class="size-8 text-[32px] leading-8"> shopping_bag </mat-icon>
        Dodaj do koszyka
      </button>
    </div>
    <app-footer></app-footer>
  </footer>
</div>
